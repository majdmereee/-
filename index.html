<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .price { color: #e74c3c; font-weight: bold; font-size: 1.1em; }
        .category { background: #eef2f5; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ قائمة الطعام</h1>
        <div id="menu-container" class="grid">جاري تحميل المنيو...</div>
    </div>

    <script>
        async function loadMenu() {
            try {
                const res = await fetch('menu.json?v=' + new Date().getTime());
                const items = await res.json();
                const container = document.getElementById('menu-container');
                container.innerHTML = items.map(item => `
                    <div class="card">
                        <h3>${item.name}</h3>
                        <span class="category">${item.category}</span>
                        <p>${item.description}</p>
                        <div class="price">${item.price} $</div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('menu-container').innerText = 'حدث خطأ أثناء تحميل القائمة.';
            }
        }
        loadMenu();
    </script>
</body>
</html>
