<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنيو الذكية - Gemini API</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Font Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- Top Header -->
    <header class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-md shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg text-lg">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">إدارة المنيو الذكية</h1>
                <p class="text-xs text-slate-400">لوحة محادثة Gemini AI</p>
            </div>
        </div>

        <button type="button" id="btnOpenSettings" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm px-4 py-2 rounded-lg flex items-center gap-2 transition border border-slate-700">
            <i class="fa-solid fa-key text-yellow-400"></i>
            <span>إعدادات المفاتيح</span>
        </button>
    </header>

    <!-- Main Content Grid -->
    <div class="flex-1 flex overflow-hidden p-4 gap-4 max-w-[1600px] w-full mx-auto">
        
        <!-- Chat Area -->
        <main class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
            
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="font-semibold text-slate-700 text-sm">مساعد Gemini الشخصي</span>
                </div>
                <div id="activeModelBadge" class="text-xs text-indigo-700 bg-indigo-50 border border-indigo-200 px-3 py-1 rounded-full font-medium">
                    جاري التعرّف على الموديل...
                </div>
            </div>

            <!-- Messages Window -->
            <div id="chatMessages" class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4">
                <div class="flex gap-3 items-start">
                    <div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center shrink-0 text-sm">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div class="bg-slate-100 text-slate-800 rounded-2xl rounded-tr-none p-4 max-w-[80%] text-sm leading-relaxed border border-slate-200 shadow-sm">
                        أهلاً بك! أنا مساعدك الذكي لإدارة المنيو. أطلب مني ما تريد وسأقوم بتعديل القائمة وحفظها فوراً على GitHub.
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="p-4 border-t border-slate-100 bg-slate-50">
                <form id="chatForm" class="flex gap-2">
                    <input type="text" id="userInput" placeholder="اكتب أمرك هنا للذكاء الاصطناعي..." 
                        class="flex-1 bg-white border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    <button type="submit" id="sendBtn" 
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold text-sm flex items-center gap-2 transition disabled:opacity-50">
                        <span>إرسال</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>

        <!-- Live Preview Sidebar -->
        <aside class="w-96 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden hidden lg:flex">
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-utensils text-indigo-600"></i>
                    <span>المعاينة المباشرة للمنيو</span>
                </h2>
                <button type="button" id="btnRefreshMenu" class="text-xs text-indigo-600 hover:underline flex items-center gap-1">
                    <i class="fa-solid fa-rotate-right"></i> تحديث
                </button>
            </div>

            <div id="liveMenuContainer" class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-3">
                <div class="text-center py-12 text-slate-400 text-sm">جاري تحميل القائمة...</div>
            </div>
        </aside>

    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-800 text-lg">إعدادات المفاتيح</h3>
                <button type="button" id="btnCloseSettings" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Gemini API Key:</label>
                    <input type="password" id="geminiKey" placeholder="AIzaSy..." 
                        class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">GitHub Personal Token:</label>
                    <input type="password" id="githubToken" placeholder="ghp_..." 
                        class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">المستودع المستهدف (Repo):</label>
                    <select id="repoSelect" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="">أدخل GitHub Token للتعرف تلقائياً</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 flex gap-2">
                <button type="button" id="btnSaveSettings" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition">
                    حفظ وإغلاق
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        let currentMenuData = [];
        let currentFileSha = "";
        let chatHistory = [];
        let detectedModelName = "gemini-2.0-flash"; // نموذج افتراضي احتياطي

        function utf8_to_b64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        function b64_to_utf8(str) {
            return decodeURIComponent(escape(atob(str)));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btnOpenSettings').addEventListener('click', toggleSettingsModal);
            document.getElementById('btnCloseSettings').addEventListener('click', toggleSettingsModal);
            document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);
            document.getElementById('btnRefreshMenu').addEventListener('click', fetchCurrentMenu);
            document.getElementById('chatForm').addEventListener('submit', handleSendMessage);
            document.getElementById('githubToken').addEventListener('change', () => autoDetectRepo());

            const savedGeminiKey = localStorage.getItem('GEMINI_KEY') || '';
            const savedGithubToken = localStorage.getItem('GITHUB_TOKEN') || '';
            const savedRepo = localStorage.getItem('GITHUB_REPO') || '';

            document.getElementById('geminiKey').value = savedGeminiKey;
            document.getElementById('githubToken').value = savedGithubToken;

            if (!savedGeminiKey || !savedGithubToken) {
                toggleSettingsModal();
            } else {
                autoDetectRepo(savedRepo);
                detectAndSetBestModel(savedGeminiKey);
            }
        });

        function toggleSettingsModal() {
            document.getElementById('settingsModal').classList.toggle('hidden');
        }

        // دالة الاكتشاف التلقائي للنموذج المتاح بحسابك (ModelService.ListModels)
        async function detectAndSetBestModel(apiKey) {
            const badge = document.getElementById('activeModelBadge');
            if (!apiKey) {
                badge.innerText = "يرجى إدخال API Key";
                return;
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!res.ok) throw new Error("فشل الاستعلام عن النماذج");

                const data = await res.json();
                if (data.models && data.models.length > 0) {
                    const validModels = data.models.filter(m => 
                        m.supportedGenerationMethods && 
                        m.supportedGenerationMethods.includes("generateContent")
                    );

                    let preferred = validModels.find(m => m.name.includes("flash") || m.name.includes("2.0") || m.name.includes("2.5"));
                    if (!preferred && validModels.length > 0) preferred = validModels[0];

                    if (preferred) {
                        detectedModelName = preferred.name.replace("models/", "");
                        badge.innerText = `الموديل النشط: ${detectedModelName}`;
                        return;
                    }
                }
            } catch (err) {
                console.warn("استخدام النموذج الاحتياطي:", err.message);
            }

            detectedModelName = "gemini-2.0-flash";
            badge.innerText = `الموديل: ${detectedModelName}`;
        }

        function saveSettings() {
            const gKey = document.getElementById('geminiKey').value.trim();
            const ghToken = document.getElementById('githubToken').value.trim();
            const repo = document.getElementById('repoSelect').value;

            localStorage.setItem('GEMINI_KEY', gKey);
            localStorage.setItem('GITHUB_TOKEN', ghToken);
            if (repo) localStorage.setItem('GITHUB_REPO', repo);

            toggleSettingsModal();
            detectAndSetBestModel(gKey);
            fetchCurrentMenu();
        }

        async function autoDetectRepo(defaultSelect = '') {
            const githubToken = document.getElementById('githubToken').value.trim();
            const repoSelect = document.getElementById('repoSelect');

            if (!githubToken) return;

            try {
                const res = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                    headers: { 'Authorization': `token ${githubToken}` }
                });

                if (!res.ok) throw new Error("GitHub Token غير صحيح");

                const repos = await res.json();
                repoSelect.innerHTML = repos.map(r => `<option value="${r.full_name}">${r.full_name}</option>`).join('');

                const savedRepo = defaultSelect || localStorage.getItem('GITHUB_REPO');
                if (savedRepo && repos.some(r => r.full_name === savedRepo)) {
                    repoSelect.value = savedRepo;
                }

                fetchCurrentMenu();
            } catch (err) {
                console.error("خطأ GitHub:", err);
            }
        }

        async function fetchCurrentMenu() {
            const token = localStorage.getItem('GITHUB_TOKEN');
            const repo = document.getElementById('repoSelect').value || localStorage.getItem('GITHUB_REPO');

            if (!token || !repo) return;

            try {
                const url = `https://api.github.com/repos/${repo}/contents/menu.json`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });

                if (res.ok) {
                    const data = await res.json();
                    currentFileSha = data.sha;
                    const jsonContent = b64_to_utf8(data.content);
                    currentMenuData = JSON.parse(jsonContent);
                    renderLiveMenu();
                }
            } catch (err) {
                console.error("خطأ جلب المنيو:", err);
            }
        }

        function renderLiveMenu() {
            const container = document.getElementById('liveMenuContainer');
            if (!currentMenuData || currentMenuData.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs">المنيو فارغ حالياً</div>`;
                return;
            }

            container.innerHTML = currentMenuData.map(item => `
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-slate-800">${item.name}</span>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">${item.price} $</span>
                    </div>
                    <span class="inline-block bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded mb-1">${item.category || 'عام'}</span>
                    <p class="text-xs text-slate-500 leading-normal">${item.description || ''}</p>
                </div>
            `).join('');
        }

        function appendChatMessage(role, text, statusBadge = null) {
            const container = document.getElementById('chatMessages');
            const isUser = role === 'user';

            const msgHtml = `
                <div class="flex gap-3 items-start ${isUser ? 'flex-row-reverse' : ''}">
                    <div class="w-8 h-8 rounded-full ${isUser ? 'bg-slate-800' : 'bg-indigo-600'} text-white flex items-center justify-center shrink-0 text-sm">
                        <i class="fa-solid ${isUser ? 'fa-user' : 'fa-robot'}"></i>
                    </div>
                    <div class="${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'} rounded-2xl p-4 max-w-[80%] text-sm leading-relaxed shadow-sm">
                        ${text}
                        ${statusBadge ? `<div class="mt-2 text-xs font-semibold text-emerald-600 flex items-center gap-1"><i class="fa-solid fa-circle-check"></i> ${statusBadge}</div>` : ''}
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', msgHtml);
            container.scrollTop = container.scrollHeight;
        }

        async function handleSendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const userMsg = input.value.trim();
            if (!userMsg) return;

            const geminiKey = localStorage.getItem('GEMINI_KEY');
            const token = localStorage.getItem('GITHUB_TOKEN');
            const repo = document.getElementById('repoSelect').value || localStorage.getItem('GITHUB_REPO');

            if (!geminiKey || !token || !repo) {
                alert("يرجى إدخال المفاتيح أولاً.");
                toggleSettingsModal();
                return;
            }

            appendChatMessage('user', userMsg);
            input.value = '';
            document.getElementById('sendBtn').disabled = true;

            try {
                if (!detectedModelName) {
                    await detectAndSetBestModel(geminiKey);
                }

                const systemInstructions = `
أنت مدير قاعدة بيانات منيو لمطعم، تتحدث وتتفاعل مع الآدمن باللغة العربية.
المهمة: قم بتعديل مصفوفة JSON المنيو الحالية حسب طلب المستخدم بدقة.

القائمة الحالية المعتمدة:
${JSON.stringify(currentMenuData, null, 2)}

قواعد الاستجابة الصارمة:
يجب أن ترجع إجابتك دائمًا بصيغة JSON حصرية فقط بالتنسيق التالي:
{
  "reply": "شرح باللغة العربية لما قمت به.",
  "updated_menu": [ ... مصفوفة العناصر المحدثة بالكامل ... ]
}
إذا كان الطلب سؤالاً لا يحتاج تعديل المنيو اجعل "updated_menu" مساوية لـ null.
`;

                chatHistory.push({ role: 'user', parts: [{ text: userMsg }] });

                const payload = {
                    contents: [
                        { role: 'user', parts: [{ text: systemInstructions }] },
                        ...chatHistory
                    ]
                };

                // الطلب المباشر باستخدام الموديل المكتشف تلقائياً بحسابك
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${detectedModelName}:generateContent?key=${geminiKey}`;

                const aiRes = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const aiData = await aiRes.json();

                if (aiData.error) throw new Error(aiData.error.message);
                if (!aiData.candidates || !aiData.candidates[0]) throw new Error("لم يتم استلام استجابة من Gemini.");

                let rawText = aiData.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("لم يرجع الذكاء الاصطناعي صيغة JSON صحيحة.");

                const parsedResponse = JSON.parse(jsonMatch[0]);
                chatHistory.push({ role: 'model', parts: [{ text: rawText }] });

                let saveBadge = null;

                if (parsedResponse.updated_menu && Array.isArray(parsedResponse.updated_menu)) {
                    currentMenuData = parsedResponse.updated_menu;
                    renderLiveMenu();

                    const updatedContentB64 = utf8_to_b64(JSON.stringify(currentMenuData, null, 2));
                    const ghUrl = `https://api.github.com/repos/${repo}/contents/menu.json`;

                    const putRes = await fetch(ghUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `تحديث المنيو عبر Gemini AI: ${userMsg.substring(0, 30)}`,
                            content: updatedContentB64,
                            sha: currentFileSha
                        })
                    });

                    if (putRes.ok) {
                        const putData = await putRes.json();
                        currentFileSha = putData.content.sha;
                        saveBadge = "تم الحفظ والتحديث على GitHub بنجاح!";
                    } else {
                        throw new Error("فشل الحفظ على GitHub.");
                    }
                }

                appendChatMessage('model', parsedResponse.reply, saveBadge);

            } catch (err) {
                appendChatMessage('model', `❌ حدث خطأ: ${err.message}`);
            } finally {
                document.getElementById('sendBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
